name: Larn

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-native:
    name: Native build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Linux
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ncurses-dev

    - name: Build (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: make

    # macOS
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ncurses

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: make

  build-cross:
    name: Cross-compile for ${{ matrix.platform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/mips
          - linux/mipsle
          - linux/mips64
          - linux/mips64le
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build for ${{ matrix.platform }}
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"

        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=./out-${SAFE} \
          -f Dockerfile.cross .

    - name: Tar output
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"
        tar -czf larn-${SAFE}.tar.gz -C out-${SAFE} .

  build-alpha:
    name: Cross-compile Alpha (alpha-linux-gnu)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Alpha cross toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-alpha-linux-gnu \
          libc6-dev-alpha-cross \
          binutils-alpha-linux-gnu \
          wget \
          build-essential

    - name: Build ncurses for Alpha
      run: |
        wget https://ftp.gnu.org/pub/gnu/ncurses/ncurses-6.4.tar.gz
        tar xf ncurses-6.4.tar.gz
        cd ncurses-6.4

        ./configure \
          --host=alpha-linux-gnu \
          --prefix=/usr/alpha-linux-gnu \
          --with-termlib --without-progs

        make -j$(nproc)
        sudo make install

    - name: Build Alpha binary
      run: |
        make -f Makefile.alpha

    - name: Upload Alpha binary
      uses: actions/upload-artifact@v4
      with:
        name: larn
        path: larn
