name: Larn

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  VERSION: "26.40"

jobs:
  build-native:
    name: Native build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Linux
    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ncurses-dev

    - name: Build (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: make

    - name: Package (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir package
        cp larn package/
        cp -r docs package/
        cp -r larnfiles package/
        ldd larn | awk '{print $3}' | xargs -I{} cp -v {} package/ || true
        tar -czf larn-26.04-linux-amd64.tar.gz -C package .

    - name: Upload (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: larn-linux-amd64
        path: larn-26.04-linux-amd64.tar.gz

    # macOS
    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install ncurses

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: make

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        mkdir package
        cp larn package/
        cp -r docs package/
        cp -r larnfiles package/
        otool -L larn | awk '{print $1}' | grep '/' | xargs -I{} cp -v {} package/ || true
        tar -czf larn-26.04-macos-universal.tar.gz -C package .

    - name: Upload (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: larn-macos-universal
        path: larn-26.04-macos-universal.tar.gz

  build-cross:
    name: Cross-compile for ${{ matrix.platform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/mips
          - linux/mipsle
          - linux/mips64
          - linux/mips64le
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compute SAFE name
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//-}"
        echo "SAFE=$SAFE" >> "$GITHUB_ENV"

    - name: Build for ${{ matrix.platform }}
      run: |
        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=./out-${SAFE} \
          -f Dockerfile.cross .

    - name: Package
      run: |
        mkdir package
        cp out-${SAFE}/larn package/
        cp -r docs package/
        cp -r larnfiles package/
        cp out-${SAFE}/*.so* package/ 2>/dev/null || true
        cp out-${SAFE}/*.a package/ 2>/dev/null || true
        tar -czf larn-26.04-${SAFE}.tar.gz -C package .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: larn-${{ env.SAFE }}
        path: larn-26.04-${{ env.SAFE }}.tar.gz

  build-alpha:
    name: Cross-compile Alpha (alpha-linux-gnu)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Alpha cross toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc-alpha-linux-gnu \
          libc6-dev-alpha-cross \
          binutils-alpha-linux-gnu \
          wget \
          build-essential

    - name: Build ncurses for Alpha
      run: |
        wget https://ftp.gnu.org/pub/gnu/ncurses/ncurses-6.4.tar.gz
        tar xf ncurses-6.4.tar.gz
        cd ncurses-6.4

        ./configure \
          --host=alpha-linux-gnu \
          --prefix=/usr/alpha-linux-gnu \
          --with-termlib --without-progs \
          --enable-widec --without-cxx \
          --without-cxx-binding --without-curses-h

        make -j$(nproc)
        sudo make install

    - name: Build Alpha binary
      run: |
        make -f Makefile.alpha

    - name: Package Alpha
      run: |
        mkdir package
        cp larn package/
        cp -r docs package/
        cp -r larnfiles package/
        cp /usr/alpha-linux-gnu/lib/libncursesw.a package/
        cp /usr/alpha-linux-gnu/lib/libtinfow.a package/
        tar -czf larn-26.04-linux-dec-alpha.tar.gz -C package .

    - name: Upload Alpha
      uses: actions/upload-artifact@v4
      with:
        name: larn-linux-dec-alpha
        path: larn-26.04-linux-dec-alpha.tar.gz

