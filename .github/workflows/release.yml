name: Larn Release

on:
  release:
    types: [published]

jobs:
  build-linux:
    name: Linux release build for ${{ matrix.platform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/mips
          - linux/mipsle
          - linux/mips64
          - linux/mips64le
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build for ${{ matrix.platform }}
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"

        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=./out-${SAFE} \
          -f Dockerfile.cross .

    - name: Create tarball
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"
        mkdir -p dist
        tar -czf dist/larn-${SAFE}.tar.gz -C out-${SAFE} .

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
