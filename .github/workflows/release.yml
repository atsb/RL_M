name: Larn Release

on:
  release:
    types: [published]

jobs:
  build-linux:
    name: Linux release build for ${{ matrix.platform }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/386
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/mips
          - linux/mipsle
          - linux/mips64
          - linux/mips64le
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build for ${{ matrix.platform }}
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"

        docker buildx build \
          --platform ${{ matrix.platform }} \
          --output type=local,dest=./out-${SAFE} \
          -f Dockerfile.cross .

    - name: Create tarball
      run: |
        SAFE="${{ matrix.platform }}"
        SAFE="${SAFE//\//_}"
        mkdir -p dist
        tar -czf dist/larn-${SAFE}.tar.gz -C out-${SAFE} .

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Windows release build
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          base-devel
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-ncurses

    - name: Build (Windows)
      shell: msys2 {0}
      run: make

    - name: Create tarball
      shell: bash
      run: |
        mkdir -p dist
        tar -czf dist/larn-windows-x86_64.tar.gz larn.exe

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
